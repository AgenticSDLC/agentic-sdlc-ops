name: Issue PR State Sync

on:
    pull_request:
        types:
            - opened
            - reopened
            - edited
            - ready_for_review
            - converted_to_draft
            - closed

permissions:
    pull-requests: read
    issues: write
    contents: read

jobs:
    sync-linked-issue-state:
        runs-on: ubuntu-latest
        steps:
            - name: Sync linked issue state
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const pr = context.payload.pull_request;
                      const body = pr.body || "";
                      const eventName = context.payload.action;
                      const stateLabels = ["ready-for-build", "in-progress", "in-review", "done", "needs-details"];

                      // Parses GitHub closing keywords and an explicit Implements: #N pattern
                      function extractIssueNumbers(text) {
                        const matches = new Set();
                        const patterns = [
                          /\b(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#(\d+)\b/gi,
                          /\bImplements:\s*(?:.*?#(\d+))/gi
                        ];

                        for (const pattern of patterns) {
                          for (const match of text.matchAll(pattern)) {
                            matches.add(Number.parseInt(match[1], 10));
                          }
                        }

                        return [...matches].filter(Number.isInteger);
                      }

                      async function syncIssueState(issueNumber, nextLabel) {
                        const issue = await github.rest.issues.get({
                          owner,
                          repo,
                          issue_number: issueNumber
                        });

                        const currentLabels = issue.data.labels.map((label) =>
                          typeof label === "string" ? label : label.name
                        );

                        const labelsToRemove = stateLabels.filter(
                          (label) => label !== nextLabel && currentLabels.includes(label)
                        );

                        for (const label of labelsToRemove) {
                          await github.rest.issues.removeLabel({
                            owner,
                            repo,
                            issue_number: issueNumber,
                            name: label
                          }).catch(() => {});
                        }

                        if (nextLabel && !currentLabels.includes(nextLabel)) {
                          await github.rest.issues.addLabels({
                            owner,
                            repo,
                            issue_number: issueNumber,
                            labels: [nextLabel]
                          });
                        }
                      }

                      const issueNumbers = extractIssueNumbers(body);

                      if (issueNumbers.length === 0) {
                        core.info("No linked issue references found in PR body.");
                        return;
                      }

                      // PR converted back to draft — revert linked issue to in-progress
                      if (eventName === "converted_to_draft") {
                        for (const issueNumber of issueNumbers) {
                          await syncIssueState(issueNumber, "in-progress");
                        }
                        return;
                      }

                      // PR closed without merge — leave issue state unchanged
                      if (eventName === "closed") {
                        if (!pr.merged_at) {
                          core.info("PR closed without merge. Leaving linked issue state unchanged.");
                          return;
                        }

                        for (const issueNumber of issueNumbers) {
                          await syncIssueState(issueNumber, "done");

                          const issue = await github.rest.issues.get({
                            owner,
                            repo,
                            issue_number: issueNumber
                          });

                          if (issue.data.state !== "closed") {
                            await github.rest.issues.update({
                              owner,
                              repo,
                              issue_number: issueNumber,
                              state: "closed"
                            });
                          }
                        }
                        return;
                      }

                      // PR ready for review — move linked issue to in-review
                      if (!pr.draft) {
                        for (const issueNumber of issueNumbers) {
                          await syncIssueState(issueNumber, "in-review");
                        }
                      }

name: Policy — Auto Merge on Verifier Pass

run-name: >-
    Auto Merge /
    ${{ github.event_name }} /
    ${{ github.event.issue && format('pr #{0}', github.event.issue.number) || (github.event.workflow_run && github.event.workflow_run.head_sha) || 'n/a' }}

# Repository-owned merge gate. Useful when branch protection is unavailable
# (or as defense in depth alongside it) — this workflow is the enforcement
# point: it squash-merges a PR only when
#   1. a <!-- split-verifier-pass --> comment exists,
#   2. no blocking signal is present (labels, stop comments, blocker marker),
#   3. every required verification job (scripts/merge-gate-policy.mjs
#      REQUIRED_CHECKS) succeeded for the PR's CURRENT head SHA.
#
# It re-evaluates whenever a verification workflow completes, so a verifier
# pass posted before CI finished does not need to be reposted.
#
# ADAPTER REQUIRED:
#   1. Install scripts/merge-gate-policy.mjs and set REQUIRED_CHECKS to your
#      repository's verify job names (the gate fails closed until you do).
#   2. Replace the workflow_run.workflows list below with the workflow names
#      that run those verify jobs.
#
# Merge is suppressed when any of these are present on the linked issue:
#   - label: merge:human-required  (deliberate tier declaration)
#   - label: hold                  (runtime pause)
#   - label: needs-human           (runtime interrupt)
#   - any PR comment containing the word: stop

on:
    issue_comment:
        types: [created]
    workflow_run:
        workflows: ["REPLACE-WITH-YOUR-VERIFY-WORKFLOW-NAME"]
        types: [completed]

permissions:
    contents: write
    pull-requests: write
    issues: write

jobs:
    auto-merge:
        name: >-
            Auto Merge /
            ${{ github.event.issue && format('pr #{0}', github.event.issue.number) || (github.event.workflow_run && github.event.workflow_run.head_sha) || 'n/a' }}
        # Run on PR comments (not plain issue comments) and on completed
        # verification workflow runs.
        if: github.event_name == 'workflow_run' || github.event.issue.pull_request != null
        runs-on: ubuntu-latest
        steps:
            - name: Checkout policy module
              uses: actions/checkout@v4

            - name: Evaluate merge gate and auto-merge
              uses: actions/github-script@v7
              with:
                  script: |
                      const { decideMerge } = await import(
                        `${process.env.GITHUB_WORKSPACE}/scripts/merge-gate-policy.mjs`
                      );

                      const owner = context.repo.owner;
                      const repo = context.repo.repo;

                      // Resolve candidate PR numbers for this event.
                      const candidates = [];
                      if (context.eventName === 'issue_comment') {
                        const commentBody = context.payload.comment.body ?? '';
                        if (!commentBody.includes('<!-- split-verifier-pass -->')) {
                          core.info('[auto-merge] comment is not a verifier pass — skipping');
                          return;
                        }
                        candidates.push(context.payload.issue.number);
                      } else {
                        const headSha = context.payload.workflow_run.head_sha;
                        const prs = context.payload.workflow_run.pull_requests ?? [];
                        for (const pr of prs) candidates.push(pr.number);
                        if (!candidates.length) {
                          // Fallback: find open PRs whose head matches the run SHA.
                          const open = await github.paginate(github.rest.pulls.list, {
                            owner, repo, state: 'open', per_page: 100,
                          });
                          for (const pr of open) {
                            if (pr.head.sha === headSha) candidates.push(pr.number);
                          }
                        }
                        if (!candidates.length) {
                          core.info(`[auto-merge] no open PR for run head ${headSha} — skipping`);
                          return;
                        }
                      }

                      for (const prNumber of candidates) {
                        const { data: pr } = await github.rest.pulls.get({
                          owner, repo, pull_number: prNumber,
                        });

                        // Resolve linked issue number from branch name: issue-<number>-<slug>
                        const branchMatch = pr.head.ref.match(/^issue-(\d+)-/);
                        if (!branchMatch) {
                          core.info(`[auto-merge] pr=${prNumber} branch=${pr.head.ref} — cannot parse issue number, skipping`);
                          continue;
                        }
                        const issueNumber = parseInt(branchMatch[1], 10);

                        const { data: issue } = await github.rest.issues.get({
                          owner, repo, issue_number: issueNumber,
                        });
                        const issueLabels = (issue.labels || []).map(l => l.name);

                        const comments = await github.paginate(github.rest.issues.listComments, {
                          owner, repo, issue_number: prNumber, per_page: 100,
                        });
                        // Pass attestations must be bound to the commit they audited via a
                        // `<!-- split-verifier-sha: <sha> -->` line; the policy module
                        // rejects unbound or stale attestations.
                        const SHA_LINE = /<!--\s*split-verifier-sha:\s*([0-9a-fA-F]{7,40})\s*-->/;
                        const verifierPasses = comments
                          .filter(c => (c.body ?? '').includes('<!-- split-verifier-pass -->'))
                          .map(c => ({
                            author: c.user?.login ?? '',
                            sha: (c.body.match(SHA_LINE)?.[1] ?? null),
                          }));
                        const hasBlockerMarker = comments.some(c =>
                          (c.body ?? '').includes('<!-- split-verifier-blocker -->'));
                        const hasStopComment = comments.some(c =>
                          (c.body ?? '').toLowerCase().includes('stop') &&
                          !c.body.includes('<!-- agent-job-status') &&
                          !c.body.includes('<!-- split-'));

                        // Check runs for the PR's CURRENT head SHA only.
                        const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                          owner, repo, ref: pr.head.sha, per_page: 100,
                        });
                        const observedRuns = checkRuns.map(run => ({
                          name: run.name,
                          headSha: pr.head.sha,
                          status: run.status,
                          conclusion: run.conclusion,
                        }));

                        const decision = decideMerge({
                          isOpen: pr.state === 'open',
                          isDraft: Boolean(pr.draft),
                          verifierPasses,
                          hasBlockerMarker,
                          hasStopComment,
                          issueLabels,
                          headSha: pr.head.sha,
                          checkRuns: observedRuns,
                        });

                        if (!decision.merge) {
                          core.info(`[auto-merge] pr=${prNumber} not mergeable — ${decision.reason}`);
                          if (decision.reason.startsWith('blocking-label:') &&
                              context.eventName === 'issue_comment') {
                            const label = decision.reason.split(':')[1];
                            await github.rest.issues.createComment({
                              owner, repo, issue_number: prNumber,
                              body: `<!-- auto-merge-suppressed -->\n**Auto-merge suppressed** — issue #${issueNumber} has label \`${label}\`. A human must review and merge this PR.`,
                            });
                          }
                          continue;
                        }

                        // Strip [TASK] prefix and any conventional commit prefix from PR title
                        // so the squash commit message is clean and not doubled.
                        const strippedTitle = pr.title
                          .replace(/^\[TASK\]\s*/i, '')
                          .replace(/^[a-z]+\(issue-\d+\):\s*/i, '')
                          .trim();
                        const commitMessage = `feat(issue-${issueNumber}): ${strippedTitle}`;

                        core.info(`[auto-merge] pr=${prNumber} issue=${issueNumber} merging — "${commitMessage}"`);

                        try {
                          await github.rest.pulls.merge({
                            owner, repo,
                            pull_number: prNumber,
                            merge_method: 'squash',
                            commit_title: commitMessage,
                            commit_message: '',
                          });
                        } catch (mergeErr) {
                          // 405 means a merge is already in progress or just completed
                          if (mergeErr.status === 405) {
                            core.info(`[auto-merge] pr=${prNumber} — 405 Merge already in progress, treating as success`);
                          } else {
                            throw mergeErr;
                          }
                        }

                        // Delete the feature branch
                        try {
                          await github.rest.git.deleteRef({
                            owner, repo,
                            ref: `heads/${pr.head.ref}`,
                          });
                          core.info(`[auto-merge] deleted branch ${pr.head.ref}`);
                        } catch (e) {
                          core.warning(`[auto-merge] could not delete branch: ${e.message}`);
                        }

                        // Transition linked issue to done
                        await github.rest.issues.removeLabel({
                          owner, repo, issue_number: issueNumber, name: 'in-review',
                        }).catch(() => {});

                        await github.rest.issues.addLabels({
                          owner, repo, issue_number: issueNumber, labels: ['done'],
                        });

                        core.info(`[auto-merge] issue=${issueNumber} labeled done`);
                      }

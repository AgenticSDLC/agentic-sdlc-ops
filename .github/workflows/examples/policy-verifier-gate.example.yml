name: Policy — Verifier Gate

run-name: >-
  Verifier Gate /
  ${{ github.event_name }} /
  ${{ github.event_name == 'pull_request' && format('pr #{0} "{1}"', github.event.pull_request.number, github.event.pull_request.title) || (github.event.issue && format('pr #{0}', github.event.issue.number)) }}

# Creates a named check `policy/verifier-gate` at the PR head SHA.
# Add `policy/verifier-gate` as a required status check in branch
# protection to enforce this gate.
#
# The gate only activates for PRs whose linked issue has both
# `topology:split` AND `agent-verifier` labels. All other PRs
# auto-pass so the gate is additive, not disruptive.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read
  checks: write

jobs:
  verifier-gate:
    name: >-
      Verifier Gate /
      ${{ github.event_name == 'pull_request' && format('pr #{0} "{1}"', github.event.pull_request.number, github.event.pull_request.title) || (github.event.issue && format('pr #{0}', github.event.issue.number)) }}
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout policy module
        uses: actions/checkout@v4

      - name: Evaluate verifier gate
        uses: actions/github-script@v7
        with:
          script: |
            const { evaluateVerifierAttestation } = await import(
              `${process.env.GITHUB_WORKSPACE}/scripts/merge-gate-policy.mjs`
            );

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let prNumber, headSha, isDraft, branchRef, prTitle;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              headSha = context.payload.pull_request.head.sha;
              isDraft = context.payload.pull_request.draft;
              branchRef = context.payload.pull_request.head.ref;
              prTitle = context.payload.pull_request.title;
            } else {
              prNumber = context.payload.issue.number;
              const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
              headSha = pr.head.sha;
              isDraft = pr.draft;
              branchRef = pr.head.ref;
              prTitle = pr.title;
            }

            const postCheck = async (conclusion, title, summary) => {
              await github.rest.checks.create({
                owner, repo,
                name: 'policy/verifier-gate',
                head_sha: headSha,
                status: 'completed',
                conclusion,
                output: { title, summary },
              });
              core.info(`[verifier-gate] conclusion=${conclusion} pr=${prNumber} sha=${headSha.slice(0, 7)} title="${prTitle}" branch=${branchRef}`);
            };

            // Gate only applies to issue-branch PRs (issue-<number>-<slug>)
            const isIssueBranch = /^issue-(\d+)-/.test(branchRef);
            if (!isIssueBranch) {
              await postCheck('success', 'Gate not applicable', 'Not an issue-branch PR — verifier gate does not apply.');
              return;
            }

            // Draft PRs cannot be merged — gate is pending, not a failure
            if (isDraft) {
              await postCheck('neutral', 'Awaiting verifier (draft)', 'PR is a draft. Gate will be evaluated when marked ready for review.');
              return;
            }

            // Gate only enforces when the linked issue uses topology:split + agent-verifier
            const issueNumber = parseInt(branchRef.match(/^issue-(\d+)-/)[1], 10);
            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            const issueLabels = issue.labels.map(l => typeof l === 'string' ? l : l.name);
            const requiresVerifier = issueLabels.includes('topology:split') && issueLabels.includes('agent-verifier');

            if (!requiresVerifier) {
              await postCheck('success', 'Verifier gate not required', 'Issue does not use topology:split + agent-verifier — gate auto-passes.');
              return;
            }

            // Collect all PR comments (paginated)
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: prNumber, per_page: 100,
            });

            const bodies = comments.map(c => c.body ?? '');
            const SHA_LINE = /<!--\s*split-verifier-sha:\s*([0-9a-fA-F]{7,40})\s*-->/;
            const verifierPasses = comments
              .filter(c => (c.body ?? '').includes('<!-- split-verifier-pass -->'))
              .map(c => ({
                author: c.user?.login ?? '',
                sha: (c.body.match(SHA_LINE)?.[1] ?? null),
              }));
            const hasBlocker = bodies.some(b => b.includes('<!-- split-verifier-blocker -->'));

            const attestation = evaluateVerifierAttestation({ verifierPasses, headSha });

            if (hasBlocker) {
              await postCheck('failure', 'Verifier blocker present', [
                'The verifier posted `<!-- split-verifier-blocker -->` on this PR.',
                '',
                'Merge is blocked until the blocker is resolved and the verifier re-runs with a pass.',
              ].join('\n'));
            } else if (!attestation.ok) {
              const detail = {
                'no-verifier-pass': 'No `<!-- split-verifier-pass -->` marker found on this PR.',
                'verifier-pass-not-sha-bound': 'A pass marker exists but carries no `<!-- split-verifier-sha: <sha> -->` line — unbound attestations are not trusted.',
                'verifier-pass-stale-sha': `A pass attestation exists but is bound to an older commit — the current head ${headSha.slice(0, 7)} has not been audited.`,
                'verifier-not-authorized': 'A bound pass attestation exists but its author is not in VERIFIER_ALLOWLIST (scripts/merge-gate-policy.mjs).',
              }[attestation.reason] ?? attestation.reason;
              await postCheck('failure', 'Awaiting valid verifier attestation', [
                detail,
                '',
                'The verifier must audit the current head and post a pass comment containing both markers.',
              ].join('\n'));
            } else {
              await postCheck('success', 'Verifier gate open', `Verifier attestation bound to head ${headSha.slice(0, 7)} confirmed. No active blockers. Safe to merge.`);
            }

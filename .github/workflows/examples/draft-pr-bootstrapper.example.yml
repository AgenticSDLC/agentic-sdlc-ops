name: Draft PR Bootstrapper

# PREREQUISITE (org-owned repos): GitHub Actions must be allowed to create
# PRs, or this workflow fails with "GitHub Actions is not permitted to
# create or approve pull requests." At <org> → Settings → Actions → General:
# set Workflow permissions to "Read and write" AND enable "Allow GitHub
# Actions to create and approve pull requests". Repo-level settings cannot
# exceed the org ceiling. See docs/operations/SETUP-PREREQS.md.
#
# Combined-topology PRs are created ready (or promoted from an existing
# draft) with WORKFLOW_TOKEN so GitHub emits the downstream pull_request
# event. Split-topology PRs remain drafts until the verifier handoff.

run-name: >-
    Draft PR Bootstrapper /
    ${{ github.event_name }} /
    ${{ github.event_name == 'issues' && format('issue #{0}', github.event.issue.number) || format('branch {0}', github.ref_name) }}

on:
    issues:
        types: [labeled]
    push:
        branches:
            - "issue-*"

permissions:
    contents: write
    pull-requests: write
    issues: write

env:
    EXECUTION_BASE_BRANCH: main

jobs:
    create-draft-pr:
        name: >-
            Bootstrap /
            ${{ github.event_name == 'issues' && format('issue #{0}', github.event.issue.number) || format('branch {0}', github.ref_name) }}
        if: |
            (github.event_name == 'issues' && github.event.label.name == 'in-progress') ||
            github.event_name == 'push'
        runs-on: ubuntu-latest

        steps:
            - name: "Early log: workflow context"
              run: |
                  echo "[draft-pr-bootstrapper][startup] event=${{ github.event_name }} action=${{ github.event.action || 'n-a' }}"
                  if [ "${{ github.event_name }}" = "issues" ]; then
                    echo "[draft-pr-bootstrapper][startup] context=issue #${{ github.event.issue.number }}: '${{ github.event.issue.title }}'"
                  else
                    echo "[draft-pr-bootstrapper][startup] context=branch $GITHUB_REF_NAME"
                  fi

            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.event_name == 'issues' && env.EXECUTION_BASE_BRANCH || github.ref_name }}

            - name: Generate branch name
              id: branch
              run: |
                  if [ "${{ github.event_name }}" = "issues" ]; then
                    ISSUE_NUMBER=${{ github.event.issue.number }}
                    TITLE=$(echo "${{ github.event.issue.title }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed -E 's/-+/-/g' | sed 's/^-//' | sed 's/-$//')
                    BRANCH="issue-${ISSUE_NUMBER}-${TITLE}"
                  else
                    BRANCH="${GITHUB_REF_NAME}"
                    ISSUE_NUMBER=$(echo "$BRANCH" | sed -E 's/^issue-([0-9]+)-.*$/\1/')
                  fi
                  echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
                  echo "branch=$BRANCH" >> $GITHUB_OUTPUT

            - name: Log workflow context
              run: |
                  echo "[draft-pr-bootstrapper] event=${{ github.event_name }} action=${{ github.event.action || 'n-a' }} issue=#${{ steps.branch.outputs.issue_number }} branch=${{ steps.branch.outputs.branch }}"

            - name: Load issue details
              id: issue
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const issue_number = Number(`${{ steps.branch.outputs.issue_number }}`);
                      const issue = await github.rest.issues.get({
                        owner,
                        repo,
                        issue_number,
                      });

                      core.setOutput('title', issue.data.title);
                      core.setOutput('number', String(issue.data.number));

            - name: Check for existing PR
              id: existing_pr
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const branch = `${{ steps.branch.outputs.branch }}`;
                      const head = `${owner}:${branch}`;
                      const issueNumber = Number(`${{ steps.issue.outputs.number }}`);

                      const prs = await github.paginate(github.rest.pulls.list, {
                        owner,
                        repo,
                        state: 'open',
                        head,
                        base: process.env.EXECUTION_BASE_BRANCH,
                        per_page: 100
                      });

                      const linked = prs.find(pr => (pr.body || '').includes(`#${issueNumber}`));
                      core.setOutput('exists', linked ? 'true' : 'false');
                      if (linked) {
                        core.setOutput('url', linked.html_url);
                        core.setOutput('number', String(linked.number));
                        core.setOutput('node_id', linked.node_id);
                        core.setOutput('draft', linked.draft ? 'true' : 'false');
                      }

            - name: Reconcile existing PR readiness
              if: steps.existing_pr.outputs.exists == 'true'
              uses: actions/github-script@v7
              env:
                  WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
              with:
                  github-token: ${{ secrets.WORKFLOW_TOKEN || github.token }}
                  script: |
                      const { decidePullRequestReadiness } = await import(
                        `${process.env.GITHUB_WORKSPACE}/scripts/pr-readiness-policy.mjs`
                      );

                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const issue_number = Number(`${{ steps.issue.outputs.number }}`);
                      const prNumber = Number(`${{ steps.existing_pr.outputs.number }}`);
                      const prNodeId = `${{ steps.existing_pr.outputs.node_id }}`;
                      const isDraft = `${{ steps.existing_pr.outputs.draft }}` === 'true';
                      const existingUrl = `${{ steps.existing_pr.outputs.url }}`;
                      const tag = '<!-- draft-pr-bootstrapper -->';

                      const issue = await github.rest.issues.get({
                        owner,
                        repo,
                        issue_number,
                      });
                      const issueLabels = (issue.data.labels || []).map(label => label.name);
                      const issueComments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number,
                        per_page: 100
                      });
                      const prComments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number: prNumber,
                        per_page: 100
                      });
                      const hasStopComment = [...issueComments, ...prComments].some(comment =>
                        /\bstop\b/i.test(comment.body || '') &&
                        !(comment.body || '').includes('<!-- agent-job-status') &&
                        !(comment.body || '').includes('<!-- split-')
                      );

                      const decision = decidePullRequestReadiness({
                        isDraft,
                        issueLabels,
                        hasStopComment,
                      });

                      async function markPullRequestReadyForReview(pullRequestId) {
                        await github.graphql(
                          `mutation($pullRequestId: ID!) {
                            markPullRequestReadyForReview(input: {pullRequestId: $pullRequestId}) {
                              pullRequest { id isDraft }
                            }
                          }`,
                          { pullRequestId },
                        );
                      }

                      if (decision.ready) {
                        if (!process.env.WORKFLOW_TOKEN) {
                          throw new Error(
                            'WORKFLOW_TOKEN is required to mark a combined PR ready and emit downstream pull_request events.'
                          );
                        }
                        await markPullRequestReadyForReview(prNodeId);
                      }

                      const existing = issueComments.find(c =>
                        typeof c.body === 'string' && c.body.includes(tag)
                      );
                      const status = decision.ready
                        ? 'Combined builder push received; PR marked ready for CI.'
                        : `PR readiness unchanged (${decision.reason}).`;
                      const body = `${tag}\n${status}\n\nPR: ${existingUrl}`;

                      if (existing) {
                        await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
                      } else {
                        await github.rest.issues.createComment({ owner, repo, issue_number, body });
                      }

            - name: Create branch if missing
              if: steps.existing_pr.outputs.exists != 'true'
              run: |
                  BRANCH="${{ steps.branch.outputs.branch }}"
                  BASE_BRANCH="${{ env.EXECUTION_BASE_BRANCH }}"
                  if git ls-remote --exit-code --heads origin "$BRANCH"; then
                    echo "Branch $BRANCH already exists on origin."
                  else
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    git fetch origin "$BASE_BRANCH"
                    git checkout -b "$BRANCH" "origin/$BASE_BRANCH"
                    git push origin "$BRANCH"
                  fi

            - name: Check branch commit delta
              id: branch_delta
              if: steps.existing_pr.outputs.exists != 'true'
              run: |
                  BRANCH="${{ steps.branch.outputs.branch }}"
                  BASE_BRANCH="${{ env.EXECUTION_BASE_BRANCH }}"
                  git fetch origin "$BASE_BRANCH" "$BRANCH"
                  AHEAD_COUNT=$(git rev-list --count "origin/$BASE_BRANCH..origin/$BRANCH")
                  echo "ahead=$AHEAD_COUNT" >> $GITHUB_OUTPUT

            - name: Comment when branch is ready but empty
              if: steps.existing_pr.outputs.exists != 'true' && steps.branch_delta.outputs.ahead == '0'
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const issue_number = Number(`${{ steps.issue.outputs.number }}`);
                      const branch = `${{ steps.branch.outputs.branch }}`;
                      const baseBranch = process.env.EXECUTION_BASE_BRANCH;
                      const tag = '<!-- draft-pr-bootstrapper -->';
                      const body = `${tag}\nBranch ready: \`${branch}\`\n\nNo commits are ahead of \`${baseBranch}\` yet, so no draft PR was created. Push the first implementation commit and the workflow will open the draft PR automatically.`;

                      const comments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number,
                        per_page: 100
                      });

                      const existing = comments.find(c => typeof c.body === 'string' && c.body.includes(tag));

                      if (existing) {
                        await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
                      } else {
                        await github.rest.issues.createComment({ owner, repo, issue_number, body });
                      }

            - name: Create topology-aware PR
              if: steps.existing_pr.outputs.exists != 'true' && steps.branch_delta.outputs.ahead != '0'
              uses: actions/github-script@v7
              env:
                  WORKFLOW_TOKEN: ${{ secrets.WORKFLOW_TOKEN }}
              with:
                  github-token: ${{ secrets.WORKFLOW_TOKEN || github.token }}
                  script: |
                      const { decidePullRequestReadiness } = await import(
                        `${process.env.GITHUB_WORKSPACE}/scripts/pr-readiness-policy.mjs`
                      );

                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const branch = `${{ steps.branch.outputs.branch }}`;
                      const issueNumber = Number(`${{ steps.issue.outputs.number }}`);
                      const issueTitle = `${{ steps.issue.outputs.title }}`;
                      const baseBranch = process.env.EXECUTION_BASE_BRANCH;
                      const title = `feat(issue-${issueNumber}): ${issueTitle}`;
                      // Fetch issue body and extract sections for the PR
                      const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                      const issueBody = issue.data.body || '';
                      const issueLabels = (issue.data.labels || []).map(label => label.name);
                      const issueComments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number: issueNumber,
                        per_page: 100,
                      });
                      const hasStopComment = issueComments.some(comment =>
                        /\bstop\b/i.test(comment.body || '') &&
                        !(comment.body || '').includes('<!-- agent-job-status') &&
                        !(comment.body || '').includes('<!-- split-')
                      );
                      const readiness = decidePullRequestReadiness({
                        isDraft: true,
                        issueLabels,
                        hasStopComment,
                      });

                      if (readiness.ready && !process.env.WORKFLOW_TOKEN) {
                        throw new Error(
                          'WORKFLOW_TOKEN is required to create a ready combined PR and emit downstream pull_request events.'
                        );
                      }

                      function extractSection(body, heading) {
                        const pattern = new RegExp(`## ${heading}\\s*\\n([\\s\\S]*?)(?=\\n---\\s*\\n|\\n## |$)`);
                        const match = body.match(pattern);
                        return match ? match[1].trim() : null;
                      }

                      const acceptanceCriteria = extractSection(issueBody, 'Acceptance Criteria');
                      const targetFiles = extractSection(issueBody, 'Target Files');

                      const lines = [
                        `Closes #${issueNumber}`,
                        '',
                        `PR automatically created after the issue branch had commits ahead of \`${baseBranch}\`.`,
                        '',
                        `_Context: issue #${issueNumber} — '${issueTitle}' / branch '${branch}' / base '${baseBranch}'_`,
                        '',
                        '---',
                        '',
                        '## Acceptance Criteria',
                        '',
                        acceptanceCriteria || '_Copy from the GitHub Issue before marking ready for review._',
                        '',
                        '---',
                        '',
                        '## Verification',
                        '',
                        'CI owns verification. Required repository checks must pass for the current head.',
                        '',
                        '---',
                        '',
                        '## Prior Art & Reuse',
                        '',
                        '- No new exports in this PR, or:',
                        '-',
                        '',
                        '---',
                        '',
                        '## Risks / Follow-Up',
                        '',
                        `- Automatic readiness decision: \`${readiness.reason}\`.`,
                      ];

                      if (targetFiles) {
                        lines.push('', '---', '', '## Target Files', '', targetFiles);
                      }

                      const body = lines.join('\n');

                      const pr = await github.rest.pulls.create({
                        owner,
                        repo,
                        title,
                        head: branch,
                        base: baseBranch,
                        body,
                        draft: !readiness.ready
                      });

                      const tag = '<!-- draft-pr-bootstrapper -->';
                      const status = readiness.ready
                        ? 'Ready combined-topology PR created; CI may begin.'
                        : `Draft PR created (${readiness.reason}).`;
                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: issueNumber,
                        body: `${tag}\n${status}\n\nPR: ${pr.data.html_url}`
                      });
